services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.local
    ports:
      - "2455:2455"
      - "1455:1455"
    volumes:
      - ${CODEX_LB_HOST_DATA_DIR:?Set CODEX_LB_HOST_DATA_DIR in .env.local}:/var/lib/codex-lb
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:2455/health/ready')
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
